name: CI

on:
  push:
    # `claude/**` so AI-authored branches get the full matrix before merge.
    branches: [main, master, "claude/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # The first build downloads the IPADIC source (lindera embed-ipadic);
  # everything after that is cached.

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # egui/winit/arboard need X11 + xkbcommon dev libraries on Linux; the
      # file dialog uses rfd's xdg-portal backend, so no GTK is required.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev
      - name: rustfmt
        if: runner.os == 'Linux'
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Release build
        run: cargo build --release -p shiori-gui
