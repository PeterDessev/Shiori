name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # The first build downloads the IPADIC source (lindera embed-ipadic);
  # everything after that is cached.

jobs:
  lint:
    name: Format and lints
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Release build
        run: cargo build --release -p shiori-gui
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiori-windows-x86_64
          path: target/release/shiori.exe
