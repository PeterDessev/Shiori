name: Deploy site

# Builds the Zola site in /site and publishes it to GitHub Pages.
# One-time setup: Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOLA_VERSION: "0.22.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo install -m 0755 zola /usr/local/bin/zola
          zola --version

      - name: Build
        working-directory: site
        run: zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
